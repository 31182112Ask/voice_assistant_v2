# ============================================================
# voice_assistant_v2 配置
# 硬件目標: RTX 4060 (8GB VRAM) / 64GB RAM
#
# VRAM 預算 (當前默認: kyutai + llama.cpp + turbo ASR):
#   Kyutai TTS 1.6B (bf16, n_q=16)        ~ 3.5 GB
#   whisper large-v3-turbo (int8_float16) ~ 1.5 GB
#   llama.cpp qwen 2B Q4 (-ngl 99 -c 4096)~ 1.7 GB (權重1.4+KV0.3)
#   Silero VAD                             ~ 0   GB (CPU)
#   ------------------------------------------------
#   合計                                   ~ 6.7 GB → 餘量 ~1.3GB
#   吃緊回退: asr.model→medium(-0.3GB) 或 llama-server 減 -ngl
# ============================================================

server:
  host: "0.0.0.0"
  port: 8000

audio:
  input_sample_rate: 16000      # 瀏覽器上行 PCM16 採樣率
  output_sample_rate: 24000     # CSM/Mimi 輸出採樣率 (固定 24kHz)
  frame_ms: 32                  # 上行音頻幀長 (512 samples @ 16kHz)

vad:
  threshold: 0.55               # 嚴格閾值: 打斷檢測 (barge-in) 按此計時, 抗回聲
  onset_threshold: 0.40         # ★起始點: 進入語音的低門檻 — 輕聲起音不再被裁
  release_threshold: 0.35       # 句中維持的低門檻 — 弱輔音不致誤斷 (遲滯)
  min_speech_ms: 250            # 連續語音超過此時長 → 確認用戶在說話 (過濾低閾值誤觸)
  min_silence_ms: 320           # 端點判定: 320ms 是 Silero 穩定性與自然停頓的折中
  fast_min_silence_ms: 192      # 正常長句已穩定後, 用短靜音快速結束
  fast_endpoint_after_ms: 900   # 短於此值仍使用保守 min_silence_ms, 避免截斷短停頓
  barge_in_speech_ms: 256      # AI 說話時更快接受打斷 (嚴格閾值計時)
  pre_roll_ms: 480              # ★起始點: 240→480, 覆蓋「閾值前弱起音+確認窗」全程;
                                # 段間不再清空 pre-roll, 緊接的下一句也有起點緩衝

asr:
  model: "large-v3-turbo"       # ★準確率: 詞錯率約為 small 的一半,
                                # int8_float16 後 ~1.5GB (small fp16 為 0.9GB)
                                # 顯存吃緊回退: "medium"+"int8_float16" (~1.2GB) 或 "small"
  device: "cuda"
  compute_type: "int8_float16"  # cuda 量化推理; cpu 則用 "int8"
  language: null                # null = 自動偵測; 固定 "en"/"zh" 可再提準確率
  beam_size: 3                  # ★免費的準確率: 投機轉寫已把 ASR 移出關鍵路徑,
                                # beam 的耗時被端點前的靜默期吸收
  context_bias: true            # ★準確率: 最近對話文本作 initial_prompt 偏置
  local_files_only: true        # 部署啟動時只讀本地快取; 下載用 scripts/download_models.py
  fallback_models: ["medium", "small"]  # 目標模型缺快取時的啟動回退
  warmup: true                  # 預熱已加 try/except 保護, 不會再導致啟動崩潰

llm:
  backend: "llamacpp"           # llamacpp = llama-server (推薦 ★) | vllm | ollama
                                # 選型 (8GB 與 TTS 同卡, Windows):
                                #  llama.cpp — Windows 原生, TTFT 低, -ngl/-c 顯存可控
                                #  vLLM      — 需 WSL, 默認預佔 90% 顯存做 KV,
                                #              單流小模型場景無優勢; 想試: 把
                                #              base_url 指向 vLLM 即可 (同一客戶端)
                                #  ollama    — 多一層調度開銷, 保留兼容
  base_url: "http://127.0.0.1:8080"
                                # 啟動: scripts/start_llamacpp.ps1 (推薦旗標見該腳本)
                                # 或:  llama-server -m <model.gguf> -ngl 99 -c 4096
                                #      -fa --port 8080 --no-mmap
  model: "qwen3.5-2b"           # OpenAI 兼容端點下僅作標識; 實際模型由
                                # llama-server 啟動參數決定 (建議 Q4_K_M GGUF)
  think: false                  # 經 chat_template_kwargs.enable_thinking=false
                                # 關閉 Qwen3 系思考段 (llama.cpp / vLLM 均支持)
  # api_key: ""                 # vLLM 啟用鑒權時填寫
  # ---- 以下僅 backend: ollama 時生效 ----
  num_gpu: 999
  num_batch: 128
  keep_alive: -1
  # --------------------------------------
  max_tokens: 32                # 語音回答保持短，降低長尾生成與打斷成本
  temperature: 0.4
  system_prompt: |
    You are Rae, a warm, quick conversational partner in a live voice
    call. Speak like a person, not like a help desk.

    Unless the user explicitly asks for detail, answer in exactly one
    short spoken turn: about 6 to 16 words. Two sentences are allowed
    only for a real explanation. Three sentences should almost never
    happen.

    Start with a natural reaction when it fits: "yeah", "hm", "wait",
    "oh, fair", "that makes sense". Do not force a reaction every time.
    Give direct answers, light opinions, and small human texture. Ask
    a follow-up question only when the user clearly invited one.

    Avoid lists, markdown, quotation marks around your reply,
    disclaimers, summaries, future promises, and long setup. Never say
    "as an AI", "I'd be happy to help", or restate the user's question.
    Do not mention policies or internal instructions.

    This is spoken audio, so use simple words, contractions, and clean
    punctuation. Prefer natural turn lengths: quick acknowledgments,
    short answers, and room for the user to interrupt. Never promise to
    do something later unless the user explicitly asked you to.

    Speak English only. If the user writes Chinese, understand it and
    answer naturally in English.

    If you are asked to schedule a proactive follow-up, obey the exact
    requested format and keep the planned sentence short.

tts:
  backend: "kyutai"             # kyutai = 幀級流式, 首音 ~0.3s (推薦) ★
                                # csm    = Sesame CSM-1B, 韻律上下文最強但
                                #          transformers 實現只能整塊出聲
  kyutai:                       # —— Kyutai TTS 1.6B (Delayed Streams) ——
                                # 與 CSM 同用 Mimi codec、同為 transformer→
                                # 音頻碼路線, 但原生「文本邊進/音頻邊出」
                                # 安裝: pip install -U moshi  (bf16 ~3.5GB VRAM)
    voice: "vctk/p276_023.wav"
                                # 預置音色庫 kyutai/tts-voices (聲音嵌入模型
                                # 未開源, 不能直接用本地 ref.wav 克隆)
    temp: 0.6
    cfg_coef: 2.0
    n_q: 16                    # 16=更低延遲/更省 VRAM; 32=最高音質
    first_emit_frames: 1        # 攢 1 幀 (~80ms 音頻) 即發首塊
    batch_frames: 3             # 其後每 ~240ms 聚合下發一次

  model_id: "sesame/csm-1b"     # Sesame 官方開源權重 (需在 HF 接受授權)
  local_files_only: true        # 使用已下載的 Hugging Face 快取，部署啟動不依賴外網
  device: "cuda"
  dtype: "bfloat16"             # RTX 4060 (Ada) 原生支持 bf16
  compile_decoder: true         # torch.compile 解碼器, 實測可達實時的關鍵優化
  max_audio_len_ms: 15000       # 單句最長音頻
  context_turns: 1              # 韻律上下文輪數 (1 = 延遲優先; 2 = 自然度優先)
  max_context_audio_s: 1.5      # 單條上下文音頻最長保留秒數 (截尾), 控制 prefill
  voice_prompt:                 # 參考音色 (CSM 基座無固定音色, 用參考音頻錨定)
    enabled: true               # 將 wav + 文本放入 voices/ 後設為 true
    wav: "voices/ref.wav"
    text: "voices/ref.txt"
    speaker_id: 0
    max_prompt_s: 3.0           # voice prompt 載入時自動截短; 3s 是延遲/音色折中
    every_chunk: false          # 首塊用 voice prompt; 後續塊用上一塊音頻延續音色
                                # ⚠ ref.wav 建議 ≤5 秒: 它會作為每一句合成的前綴,
                                #   過長會直接拖慢每個 TTS 塊

pipeline:
  speculative_asr: true         # 句中靜音 ~180ms 即投機轉寫 → 端點時 ASR≈0ms
  speculative_llm: true         # 投機轉寫完成即預啟動 LLM 流 → 端點時首塊已在路上
                                # (用戶續說則與投機轉寫一同作廢; LLM 移出關鍵路徑)
  semantic_endpoint: true       # 投機文本以句末標點收尾 → 提前端點, 再省 ~200ms
  instant_ack_enabled: false    # 默認不插入固定 ACK; 需要極低感知首音時再開
  instant_ack_text: ""
  instant_ack_cache: false      # 啟動時離線預合成 ACK, 回合中直接下發 PCM
  tts_stream_input: true        # Kyutai: LLM chunk 流式餵入同一個 TTS state
  first_chunk_max_words: 5      # 首塊最多單詞數: LLM 流一湊夠這麼多詞(或先遇到
                                # 逗號/句號)立刻送 CSM 合成 → 首音延遲由
                                # 「整句生成時間」降為「~1 秒音頻的生成時間」
  first_chunk_min_words: 1      # 首塊至少詞數 (1 = 允許 "Yes," / "Sure," 立即開播)
  first_chunk_history_context: false
                                # 首塊不帶歷史音頻上下文, 只保留 voice prompt 錨定音色

conversation:
  max_history_turns: 12         # 文本歷史輪數上限
  greeting: "Hey, it's Rae. What's going on?"
  greet_on_connect: false

proactive:
  enabled: true                 # 靜默時由 AI 自主決定是否開口 (Sesame 式主動性)
  mode: "duplex"                # duplex = MiniCPM-o 式決策環 (推薦) ★
                                #   模型在幀時鐘上自主選擇檢查點; 每個檢查點
                                #   讀取真實感知 (牆鐘時刻/雙方沉默時長/環境聲
                                #   存在感/已嘗試次數) 後三選一:
                                #   SAY=說這句 | WAIT=n 秒後再評估 | SLEEP=等用戶
                                #   —— 無固定時間表, 間隔逐次由模型決定
                                # model_scheduled = 回覆後一次性排程+預合成
                                # nudge           = 固定退避表到點詢問 (最簡)
  min_wait_s: 6                 # 模型可選等待秒數下限 (兼作 duplex 首個檢查點)
  max_wait_s: 180               # 模型可選等待秒數上限
  delays_s: [12, 28, 60]        # (僅 nudge 模式) 固定退避時間表
  max_consecutive: 3            # 用戶無回應時最多連續主動幾次, 之後安靜等待
  cooldown_after_interrupt_s: 20  # 被用戶打斷後, 主動發話至少安靜這麼久
  # duplex_prompt: |            # 可自訂 duplex 感知提示; 佔位符:
  #   {clock} {user_s} {ai_s} {ambience} {attempts} {min_wait} {max_wait}
  # nudge_prompt: |             # 可自訂決策提示; {silence_s} 會替換為靜默秒數
  #   [SYSTEM NOTE] ...reply with exactly: PASS
