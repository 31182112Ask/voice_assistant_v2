# ============================================================
# voice_assistant_v2 配置
# 硬件目標: RTX 4060 (8GB VRAM) / 64GB RAM
#
# VRAM 預算 (preset: balanced):
#   CSM-1B (bf16) + Mimi codec   ~ 4.3 GB   (GPU)
#   faster-whisper small (int8)  ~ 0   GB   (CPU, 64GB RAM 足夠)
#   Silero VAD                   ~ 0   GB   (CPU)
#   LLM (Ollama qwen2.5:3b)      ~ 2.2 GB   (GPU, 由 Ollama 管理)
#   ------------------------------------------------
#   合計                          ~ 6.5 GB  → 留 ~1.5GB 餘量給 KV cache
# ============================================================

server:
  host: "0.0.0.0"
  port: 8000

audio:
  input_sample_rate: 16000      # 瀏覽器上行 PCM16 採樣率
  output_sample_rate: 24000     # CSM/Mimi 輸出採樣率 (固定 24kHz)
  frame_ms: 32                  # 上行音頻幀長 (512 samples @ 16kHz)

vad:
  threshold: 0.55               # 語音概率閾值
  min_speech_ms: 250            # 連續語音超過此時長 → 確認用戶在說話
  min_silence_ms: 320           # 端點判定: 320ms 是 Silero 穩定性與自然停頓的折中
  fast_min_silence_ms: 192      # 正常長句已穩定後, 用短靜音快速結束
  fast_endpoint_after_ms: 900   # 短於此值仍使用保守 min_silence_ms, 避免截斷短停頓
  barge_in_speech_ms: 256       # AI 說話時更快接受打斷
                                # (比 min_speech_ms 略高, 抗回聲誤觸發)
  pre_roll_ms: 240              # 語音起點前保留的緩衝, 避免吃掉首字

asr:
  model: "small"                # tiny / base / small / medium / large-v3-turbo
  device: "cuda"                # GPU ASR: 1.8s 語音實測可由秒級降到數百毫秒
  compute_type: "float16"       # cpu→int8 / cuda→float16
  language: null                # null = 自動偵測; 可設 "en" / "zh"
  beam_size: 1                  # 貪心解碼, 對話場景準確率幾乎無損, 提速 ~30-40%
  warmup: true                  # 預熱已加 try/except 保護, 不會再導致啟動崩潰

llm:
  backend: "ollama"
  base_url: "http://127.0.0.1:11434"
  model: "qwen3.5:2b"           # 本機已安裝; 低佔用，適合 8GB VRAM 與 CSM 並行
  think: false                  # 關閉推理模型的 thinking 欄位，確保語音回答進 content
  num_gpu: 999                  # 2B LLM 全放 GPU; 仍保留足夠 VRAM 給 CSM + ASR
  num_batch: 128                # Ollama prompt/decode batch; RTX 4060 上首 token 約省 150-250ms
  keep_alive: -1                # 常駐內存, 杜絕 Ollama 5 分鐘後卸載→下一輪重載數秒的隨機高延遲
  # 若想完全不佔 GPU: 在啟動 Ollama 前設 OLLAMA_NUM_GPU=0 (純 CPU, 64GB RAM 無壓力)
  max_tokens: 80                # 語音回答保持短，降低長尾生成與打斷成本
  temperature: 0.4
  system_prompt: |
    Reply for real-time spoken chat. Answer directly after the system's brief
    acknowledgment. Keep it under two short sentences. Use English. No markdown.

tts:
  backend: "kyutai"             # kyutai = 幀級流式, 首音 ~0.3s (推薦) ★
                                # csm    = Sesame CSM-1B, 韻律上下文最強但
                                #          transformers 實現只能整塊出聲
  kyutai:                       # —— Kyutai TTS 1.6B (Delayed Streams) ——
                                # 與 CSM 同用 Mimi codec、同為 transformer→
                                # 音頻碼路線, 但原生「文本邊進/音頻邊出」
                                # 安裝: pip install -U moshi  (bf16 ~3.5GB VRAM)
    voice: "vctk/p276_023.wav"
                                # 預置音色庫 kyutai/tts-voices (聲音嵌入模型
                                # 未開源, 不能直接用本地 ref.wav 克隆)
    temp: 0.6
    cfg_coef: 2.0
    n_q: 16                    # 16=更低延遲/更省 VRAM; 32=最高音質
    first_emit_frames: 1        # 攢 1 幀 (~80ms 音頻) 即發首塊
    batch_frames: 3             # 其後每 ~240ms 聚合下發一次

  model_id: "sesame/csm-1b"     # Sesame 官方開源權重 (需在 HF 接受授權)
  local_files_only: true        # 使用已下載的 Hugging Face 快取，部署啟動不依賴外網
  device: "cuda"
  dtype: "bfloat16"             # RTX 4060 (Ada) 原生支持 bf16
  compile_decoder: true         # torch.compile 解碼器, 實測可達實時的關鍵優化
  max_audio_len_ms: 15000       # 單句最長音頻
  context_turns: 1              # 韻律上下文輪數 (1 = 延遲優先; 2 = 自然度優先)
  max_context_audio_s: 1.5      # 單條上下文音頻最長保留秒數 (截尾), 控制 prefill
  voice_prompt:                 # 參考音色 (CSM 基座無固定音色, 用參考音頻錨定)
    enabled: true               # 將 wav + 文本放入 voices/ 後設為 true
    wav: "voices/ref.wav"
    text: "voices/ref.txt"
    speaker_id: 0
    max_prompt_s: 3.0           # voice prompt 載入時自動截短; 3s 是延遲/音色折中
    every_chunk: false          # 首塊用 voice prompt; 後續塊用上一塊音頻延續音色
                                # ⚠ ref.wav 建議 ≤5 秒: 它會作為每一句合成的前綴,
                                #   過長會直接拖慢每個 TTS 塊

pipeline:
  instant_ack_enabled: false    # 默認不插入固定 ACK; 需要極低感知首音時再開
  instant_ack_text: ""
  instant_ack_cache: false      # 啟動時離線預合成 ACK, 回合中直接下發 PCM
  tts_stream_input: true        # Kyutai: LLM chunk 流式餵入同一個 TTS state
  first_chunk_max_words: 5      # 首塊最多單詞數: LLM 流一湊夠這麼多詞(或先遇到
                                # 逗號/句號)立刻送 CSM 合成 → 首音延遲由
                                # 「整句生成時間」降為「~1 秒音頻的生成時間」
  first_chunk_min_words: 1      # 首塊至少詞數 (1 = 允許 "Yes," / "Sure," 立即開播)
  first_chunk_history_context: false
                                # 首塊不帶歷史音頻上下文, 只保留 voice prompt 錨定音色

conversation:
  max_history_turns: 12         # 文本歷史輪數上限
  greeting: "Hey! I'm listening — what's on your mind?"
  greet_on_connect: true
