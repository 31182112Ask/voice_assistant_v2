<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>語音助手 · voice_assistant_v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,360;0,9..144,560;1,9..144,360;1,9..144,460&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-tc-webfont@1.7.0/style.css" rel="stylesheet">
<style>
  :root{
    --paper:#EFF1EF;      /* 冷瓷白 */
    --panel:#F8F9F8;
    --ink:#232827;        /* 墨 */
    --mist:#76817D;       /* 霧灰 */
    --hairline:#DBE0DD;
    --pine:#2F6B5D;       /* 松綠 — 只給「活的聲音」 */
    --pine-soft:#2F6B5D22;
    --clay:#A85B45;       /* 陶土 — 僅打斷/錯誤 */
    --serif:"Fraunces",serif;
    --kai:"LXGW WenKai TC","Noto Serif TC","Songti TC","KaiTi",serif;
    --mono:"Spline Sans Mono","SF Mono",Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--kai);
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(18px,4vh,40px) 20px 28px;
  }

  .sheet{width:min(680px,100%);display:flex;flex-direction:column;flex:1;min-height:0}

  /* ── 頂欄:字標 + 連線 ── */
  .masthead{display:flex;align-items:baseline;gap:10px;padding-bottom:6px}
  .masthead .wordmark{
    font-family:var(--serif);font-weight:560;font-size:19px;
    letter-spacing:.01em;font-variation-settings:"opsz" 40;
  }
  .masthead .meta{font-family:var(--mono);font-size:10.5px;color:var(--mist);letter-spacing:.06em}
  .conn{margin-left:auto;display:flex;align-items:center;gap:7px;
        font-family:var(--mono);font-size:10.5px;color:var(--mist)}
  .conn i{width:6px;height:6px;border-radius:50%;background:var(--hairline);
          outline:3px solid transparent;transition:background .4s,outline-color .4s}
  .conn.on i{background:var(--pine);outline-color:var(--pine-soft)}

  /* ── 簽名元素:墨線 ── */
  .trace-wrap{padding:clamp(14px,4vh,34px) 0 4px}
  canvas#trace{display:block;width:100%;height:96px}
  .state-row{
    display:flex;align-items:baseline;justify-content:center;gap:10px;
    padding:2px 0 clamp(12px,3vh,24px);min-height:38px;
  }
  .state-zh{
    font-family:var(--serif);font-style:italic;font-weight:460;
    font-size:21px;letter-spacing:.12em;
    transition:opacity .18s ease;
  }
  .state-en{font-family:var(--mono);font-size:10px;color:var(--mist);
            letter-spacing:.22em;text-transform:uppercase}
  .state-row.swap .state-zh{opacity:0}

  /* ── 逐字稿:手稿式 ── */
  .ledger{
    flex:1;min-height:140px;overflow-y:auto;
    border-top:1px solid var(--hairline);
    scrollbar-width:thin;scrollbar-color:var(--hairline) transparent;
  }
  .ledger:empty::after{
    content:"按下「開始對話」，直接開口說話。助手說話時，你隨時開口即可打斷。";
    display:block;text-align:center;color:var(--mist);
    font-size:13.5px;letter-spacing:.05em;padding:46px 24px;
  }
  .turn{
    display:grid;grid-template-columns:64px 1fr;gap:14px;
    padding:13px 2px;border-bottom:1px solid var(--hairline);
  }
  .turn .who{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;
    color:var(--mist);padding-top:5px;
  }
  .turn .who .tag{display:block;margin-top:3px;color:var(--clay);
                  letter-spacing:.08em;font-size:9.5px}
  .turn .who .tag.pro{color:var(--mist)}
  .turn .who .lat{display:block;margin-top:3px;font-size:9.5px;
                  color:var(--mist);letter-spacing:.06em}

  .composer{display:flex;gap:10px;padding-top:16px}
  .composer input{
    flex:1;min-width:0;font-family:var(--kai);font-size:14px;
    color:var(--ink);background:var(--panel);
    border:1px solid var(--hairline);border-radius:2px;
    padding:10px 14px;transition:border-color .25s;
  }
  .composer input::placeholder{color:var(--mist);font-size:13px}
  .composer input:focus{outline:none;border-color:var(--pine)}
  .composer input:disabled{opacity:.45}
  .turn .txt{font-size:15px;line-height:1.85;letter-spacing:.015em;
             overflow-wrap:anywhere}
  .turn.user .txt{color:var(--pine)}
  .turn.ai.partial .txt::after{
    content:"";display:inline-block;width:1px;height:.95em;
    background:var(--ink);margin-left:3px;vertical-align:-2px;
    animation:caret 1.1s steps(1) infinite;
  }
  .turn.sys .txt{color:var(--clay);font-size:13.5px}
  @keyframes caret{50%{opacity:0}}

  /* ── 操作 ── */
  .actions{display:flex;gap:12px;justify-content:center;padding-top:20px}
  button{
    font-family:var(--mono);font-size:12px;letter-spacing:.14em;
    color:var(--ink);background:transparent;
    border:1px solid var(--hairline);border-radius:2px;
    padding:11px 26px;cursor:pointer;
    transition:border-color .25s,color .25s,background .25s;
  }
  button:hover{background:var(--panel);border-color:var(--mist)}
  button.primary{border-color:var(--pine);color:var(--pine)}
  button.primary:hover{background:var(--pine-soft)}
  button:disabled{opacity:.4;cursor:default;background:transparent}
  button:focus-visible{outline:2px solid var(--pine);outline-offset:2px}

  @media (prefers-reduced-motion: reduce){
    .turn.ai.partial .txt::after{animation:none}
  }
  @media (max-width:480px){
    .turn{grid-template-columns:50px 1fr;gap:10px}
    .masthead .meta{display:none}
  }
</style>
</head>
<body>
<div class="sheet">

  <header class="masthead">
    <span class="wordmark">語音助手</span>
    <span class="meta">voice_assistant_v2 · 本地全雙工</span>
    <span class="conn" id="conn"><i></i><span id="connText">未連線</span></span>
  </header>

  <div class="trace-wrap">
    <canvas id="trace" aria-hidden="true"></canvas>
    <div class="state-row" id="stateRow" aria-live="polite">
      <span class="state-zh" id="stateZh">離線</span>
      <span class="state-en" id="stateEn">offline</span>
    </div>
  </div>

  <main class="ledger" id="log"></main>

  <div class="composer">
    <input id="textInput" placeholder="不方便說話時，打字也行 — Enter 送出" disabled
           autocomplete="off" maxlength="500">
  </div>
  <div class="actions">
    <button class="primary" id="btnStart">開始對話</button>
    <button id="btnExport" disabled>下載逐字稿</button>
    <button id="btnReset" disabled>清空記憶</button>
  </div>

</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const logEl = $("log");

let ws = null, audioCtx = null, workletNode = null, micStream = null;
let outputSR = 24000, reconnectDelay = 1000;
let started = false, muted = false;

/* ════════ 墨線 (簽名元素): 由真實音頻驅動的 canvas 線 ════════ */
const trace = (() => {
  const cv = $("trace"), ctx = cv.getContext("2d");
  const N = 320;                          // 環形緩衝點數
  const amp = new Float32Array(N);        // 振幅歷史
  const hue = new Float32Array(N);        // 0=墨(助手/閒) 1=松綠(你)
  let micLevel = 0, vadOn = false, mode = "offline";
  let analyser = null, anaBuf = null;
  let t = 0, dpr = 1;
  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

  function resize(){
    dpr = window.devicePixelRatio || 1;
    cv.width = cv.clientWidth * dpr;
    cv.height = cv.clientHeight * dpr;
  }
  new ResizeObserver(resize).observe(cv); resize();

  function outLevel(){
    if (!analyser) return 0;
    analyser.getFloatTimeDomainData(anaBuf);
    let s = 0;
    for (let i = 0; i < anaBuf.length; i += 4) s += anaBuf[i]*anaBuf[i];
    return Math.sqrt(s / (anaBuf.length / 4));
  }

  function frame(){
    t += 1;
    // 取當前能量: 聆聽→麥克風 / 說話→播放端, 二者取大以呈現搶話瞬間
    const out = outLevel();
    const level = Math.max(micLevel, out);
    micLevel *= 0.86;                     // 峰值衰減
    // 寫入環形緩衝 (整體左移一格)
    amp.copyWithin(0, 1); hue.copyWithin(0, 1);
    amp[N-1] = amp[N-2] * 0.5 + Math.min(1, level * 3.2) * 0.5;  // 時間平滑
    hue[N-1] = (vadOn && micLevel > out) ? 1 : 0;

    const w = cv.width, h = cv.height, mid = h / 2;
    ctx.clearRect(0, 0, w, h);

    // 每點振幅 = 信號 + 遊走微波(閒置呼吸), 兩端收尖如一筆墨痕
    const maxH = h * 0.42;
    const A = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      const u = i / (N - 1);
      const taper = Math.sin(Math.PI * u) ** 0.6;          // 端點漸隱
      const idle = reduced ? 0.012
        : 0.016 + Math.sin(u * 9.4 + t / 38) * 0.011
                + Math.sin(u * 23  - t / 57) * 0.005;       // 雙頻遊走微波
      const sm = (amp[Math.max(0,i-1)] + amp[i]*2 + amp[Math.min(N-1,i+1)]) / 4;
      A[i] = (Math.pow(sm, 0.85) + idle) * taper * maxH;
    }
    const ink = getComputedStyle(document.body).getPropertyValue("--ink").trim();
    const pine = getComputedStyle(document.body).getPropertyValue("--pine").trim();
    for (const pass of [0, 1]) {          // 0=墨段 1=綠段, 分色繪製
      ctx.beginPath();
      let drawing = false;
      for (let i = 0; i < N; i++) {
        if ((hue[i] > 0.5 ? 1 : 0) !== pass) { drawing = false; continue; }
        const x = (i / (N - 1)) * w;
        if (!drawing) { ctx.moveTo(x, mid - A[i]); drawing = true; }
        else ctx.lineTo(x, mid - A[i]);
      }
      // 下半鏡像
      drawing = false;
      for (let i = N - 1; i >= 0; i--) {
        if ((hue[i] > 0.5 ? 1 : 0) !== pass) { drawing = false; continue; }
        const x = (i / (N - 1)) * w;
        if (!drawing) { ctx.moveTo(x, mid + A[i]); drawing = true; }
        else ctx.lineTo(x, mid + A[i]);
      }
      ctx.strokeStyle = pass ? pine : ink;
      ctx.globalAlpha = pass ? 0.9 : 0.8;
      ctx.lineWidth = Math.max(1, dpr);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // 思考: 一粒墨點沿線緩行
    if (mode === "thinking" && !reduced) {
      const p = (t % 140) / 140;
      const x = p * w, i = Math.floor(p * (N - 1));
      ctx.beginPath();
      ctx.arc(x, mid - A[i], 2.6 * dpr, 0, Math.PI * 2);
      ctx.fillStyle = ink; ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  return {
    setMicChunk(i16){                      // 從上行音頻幀計算 RMS
      let s = 0;
      for (let i = 0; i < i16.length; i += 8) { const v = i16[i]/32768; s += v*v; }
      const rms = Math.sqrt(s / (i16.length / 8));
      if (rms > micLevel) micLevel = rms;
    },
    attachOutput(ctxA, node){              // 播放端接 Analyser
      analyser = ctxA.createAnalyser();
      analyser.fftSize = 512;
      anaBuf = new Float32Array(analyser.fftSize);
      node.connect(analyser);
      analyser.connect(ctxA.destination);
      return analyser;
    },
    set vad(v){ vadOn = v; },
    set mode(m){ mode = m; },
  };
})();

/* ════════ 播放隊列 (可打斷) ════════ */
let outBus = null;                         // GainNode → Analyser → destination
const player = {
  playhead: 0, sources: new Set(),
  enqueue(pcmBytes) {
    const i16 = new Int16Array(pcmBytes);
    const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
    const buf = audioCtx.createBuffer(1, f32.length, outputSR);
    buf.copyToChannel(f32, 0);
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(outBus);
    const t = Math.max(audioCtx.currentTime + 0.04, this.playhead);
    src.start(t);
    this.playhead = t + buf.duration;
    this.sources.add(src);
    src.onended = () => {
      this.sources.delete(src);
      if (this.sources.size === 0) {
        send({type: "playback_done"});
        finishPartial(false);
      }
    };
  },
  flush() {  // barge-in: 立即靜音
    for (const s of this.sources) { s.onended = null; try{s.stop()}catch(_){} }
    this.sources.clear();
    this.playhead = 0;
  }
};

/* ════════ 麥克風採集: AudioWorklet → 16kHz PCM16 ════════ */
const WORKLET = `
class Capture extends AudioWorkletProcessor {
  constructor(){ super(); this.ratio = sampleRate / 16000; this.acc = 0; this.buf = []; }
  process(inputs){
    const ch = inputs[0][0];
    if (!ch) return true;
    for (let i = 0; i < ch.length; i++) {
      this.acc += 1;
      if (this.acc >= this.ratio) {
        this.acc -= this.ratio;
        let v = Math.max(-1, Math.min(1, ch[i]));
        this.buf.push(v * 32767 | 0);
        if (this.buf.length >= 1024) {  // 64ms 一包
          this.port.postMessage(Int16Array.from(this.buf).buffer, []);
          this.buf.length = 0;
        }
      }
    }
    return true;
  }
}
registerProcessor("capture", Capture);`;

async function startAudio() {
  audioCtx = new AudioContext();
  outBus = audioCtx.createGain();
  trace.attachOutput(audioCtx, outBus);
  micStream = await navigator.mediaDevices.getUserMedia({audio: {
    echoCancellation: true,   // 打斷不誤觸發的第一道防線
    noiseSuppression: true,
    autoGainControl: true,
    channelCount: 1,
  }});
  const url = URL.createObjectURL(new Blob([WORKLET], {type: "application/javascript"}));
  await audioCtx.audioWorklet.addModule(url);
  workletNode = new AudioWorkletNode(audioCtx, "capture");
  workletNode.port.onmessage = e => {
    if (muted) return;                 // 靜音: 不上行 → 服務端流時鐘凍結
    trace.setMicChunk(new Int16Array(e.data));
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
  };
  audioCtx.createMediaStreamSource(micStream).connect(workletNode);
}

/* ════════ WebSocket ════════ */
function send(obj){ if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

function connect() {
  ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => {
    $("conn").classList.add("on"); $("connText").textContent = "已連線";
    $("btnReset").disabled = false;
    reconnectDelay = 1000;
  };
  ws.onclose = () => {
    $("conn").classList.remove("on");
    setState("offline");
    if (!started) { $("connText").textContent = "未連線"; return; }
    $("connText").textContent = "重連中";
    const delay = Math.min(reconnectDelay, 10000);
    reconnectDelay *= 2;
    setTimeout(connect, delay);
  };
  ws.onmessage = ev => {
    if (ev.data instanceof ArrayBuffer) { player.enqueue(ev.data); return; }
    const m = JSON.parse(ev.data);
    switch (m.type) {
      case "ready":            outputSR = m.output_sr; break;
      case "state":            setState(m.state); break;
      case "vad":              trace.vad = m.speaking; break;
      case "user_transcript":  addTurn("user", "你", m.text); break;
      case "turn_latency":     pendingLatency = m.ms; break;
      case "assistant_delta":   appendAssistantDelta(m.text, m.proactive); break;
      case "assistant_sentence": appendAssistantDelta(m.text, m.proactive); break;
      case "assistant_done":   /* 等播放結束時 finishPartial */ break;
      case "interrupt":        player.flush(); finishPartial(true); break;
      case "history_cleared":  logEl.innerHTML = ""; break;
      case "error":            addTurn("sys", "系統", m.message); break;
    }
  };
}

/* ════════ UI ════════ */
const STATES = {
  listening: ["聆聽", "listening"],
  thinking:  ["思考", "thinking"],
  speaking:  ["說話", "speaking"],
  offline:   ["離線", "offline"],
};
function setState(s) {
  trace.mode = s;
  const [zh, en] = STATES[s] || [s, s];
  const row = $("stateRow");
  row.classList.add("swap");
  setTimeout(() => {
    $("stateZh").textContent = zh;
    $("stateEn").textContent = en;
    row.classList.remove("swap");
  }, 180);
}
function addTurn(cls, who, text) {
  const d = document.createElement("div");
  d.className = "turn " + cls;
  d.innerHTML = `<div class="who"></div><div class="txt"></div>`;
  d.querySelector(".who").textContent = who;
  d.querySelector(".txt").textContent = text;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
  return d;
}
let partialAI = null, pendingLatency = null;
let captionQueue = [], captionTimer = null;
function ensureAssistantTurn(proactive) {
  if (!partialAI) {
    partialAI = addTurn("ai partial", "助手", "");
    captionQueue = [];
    if (captionTimer) { clearTimeout(captionTimer); captionTimer = null; }
    const who = partialAI.querySelector(".who");
    if (proactive) {
      const tag = document.createElement("span");
      tag.className = "tag pro"; tag.textContent = "主動";
      who.appendChild(tag);
    }
    if (pendingLatency != null) {
      const lat = document.createElement("span");
      lat.className = "lat";
      lat.textContent = (pendingLatency/1000).toFixed(1) + "s";
      who.appendChild(lat);
      pendingLatency = null;
    }
  }
  return partialAI;
}
function formatCaptionDelta(base, delta) {
  const text = (delta || "").trim();
  if (!text) return "";
  if (!base) return text;
  if (/^[,.;:!?，。！？、]/.test(text)) return text;
  if (/\s$/.test(base) || /^\s/.test(delta || "")) return text;
  return " " + text;
}
function plannedCaptionText() {
  if (!partialAI) return "";
  return partialAI.querySelector(".txt").textContent + captionQueue.join("");
}
function captionDelay(ch) {
  if (/[.!?。！？]/.test(ch)) return 120;
  if (/[,;:，、]/.test(ch)) return 70;
  if (ch === " ") return 18;
  return 24;
}
function scheduleCaptionTick() {
  if (captionTimer || !partialAI || captionQueue.length === 0) return;
  captionTimer = setTimeout(() => {
    captionTimer = null;
    if (!partialAI) { captionQueue = []; return; }
    const ch = captionQueue.shift();
    const t = partialAI.querySelector(".txt");
    t.textContent += ch;
    logEl.scrollTop = logEl.scrollHeight;
    scheduleCaptionTick();
  }, captionDelay(captionQueue[0]));
}
function appendAssistantDelta(delta, proactive) {
  ensureAssistantTurn(proactive);
  const addition = formatCaptionDelta(plannedCaptionText(), delta);
  if (!addition) return;
  captionQueue.push(...Array.from(addition));
  scheduleCaptionTick();
}
function finishPartial(interrupted) {
  if (!partialAI) return;
  if (interrupted) {
    captionQueue = [];
    if (captionTimer) { clearTimeout(captionTimer); captionTimer = null; }
  } else if (captionQueue.length > 0) {
    partialAI.querySelector(".txt").textContent += captionQueue.join("");
    captionQueue = [];
    if (captionTimer) { clearTimeout(captionTimer); captionTimer = null; }
  }
  partialAI.classList.remove("partial");
  if (interrupted) {
    const who = partialAI.querySelector(".who");
    const tag = document.createElement("span");
    tag.className = "tag"; tag.textContent = "被打斷";
    who.appendChild(tag);
  }
  partialAI = null;
}

/* ════════ 入口 ════════ */
$("btnStart").onclick = async () => {
  if (started) {                       // 已運行 → 切換靜音
    muted = !muted;
    $("btnStart").textContent = muted ? "恢復聆聽" : "靜音";
    $("btnStart").classList.toggle("primary", !muted);
    return;
  }
  $("btnStart").disabled = true;
  try {
    await startAudio();
    connect();
    setState("listening");
    started = true;
    $("btnStart").disabled = false;
    $("btnStart").textContent = "靜音";
    $("textInput").disabled = false;
    $("btnExport").disabled = false;
  } catch (e) {
    $("btnStart").disabled = false;
    $("btnStart").textContent = "開始對話";
    addTurn("sys", "系統", "無法使用麥克風：" + e.message);
  }
};
$("btnReset").onclick = () => { player.flush(); finishPartial(true); send({type:"reset"}); };

/* 文字輸入: 打字直通, 回應仍是語音 */
$("textInput").addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const text = e.target.value.trim();
  if (!text) return;
  e.target.value = "";
  player.flush(); finishPartial(true);   // 打字視同搶話
  send({type: "text_input", text});
});

/* 下載逐字稿 (markdown) */
$("btnExport").onclick = () => {
  const lines = ["# 對話記錄 — " + new Date().toLocaleString(), ""];
  for (const t of logEl.querySelectorAll(".turn")) {
    const who = t.querySelector(".who").firstChild.textContent.trim();
    const txt = t.querySelector(".txt").textContent.trim();
    const tags = [...t.querySelectorAll(".tag")].map(x => x.textContent).join("·");
    lines.push(`**${who}**${tags ? `（${tags}）` : ""}：${txt}`, "");
  }
  const blob = new Blob([lines.join("\n")], {type: "text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "voice_chat_" + Date.now() + ".md";
  a.click(); URL.revokeObjectURL(a.href);
};

/* 快捷鍵: M = 靜音切換 (輸入框未聚焦時) */
document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "m" && started
      && document.activeElement !== $("textInput")) $("btnStart").click();
});
</script>
</body>
</html>
